name: Run BotActions tests

on:
  push:
    branches: [ JUnitTests ]
  pull_request:
    branches: [ JUnitTests ]

jobs:
  test:
    name: Run BotActionsTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run BotActions test class
        working-directory: MtdrSpring/backend
        run: |
          CI=false ./mvnw -B -Dtest=BotActionsTest test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: MtdrSpring/backend/target/surefire-reports
